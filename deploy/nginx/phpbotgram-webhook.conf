# nginx reverse-proxy snippet for a phpbotgram webhook bot.
#
# Place this file under /etc/nginx/sites-available/ (or include it from your
# server-level config) and create a matching symlink in sites-enabled/.
#
# Assumes the bot process binds AmphpServer to 127.0.0.1:8080 (the default in
# examples/echo_bot_webhook.php). TLS termination happens here; the upstream
# speaks plain HTTP/1.1 on the loopback interface.

upstream phpbotgram_webhook {
    # The amphp/http-server inside the bot is single-process by design.
    # If you need to scale horizontally, run multiple bots on different ports
    # and add `keepalive 32;` so the proxy reuses idle connections.
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bot.example.com;

    # Telegram's webhook source CIDR ranges. Mirrors src/Webhook/IpFilter.php;
    # update both files together if Telegram rotates them — see
    # https://core.telegram.org/bots/webhooks for the authoritative list.
    # Defence in depth: the framework's IpFilter middleware checks these too.
    allow 149.154.160.0/20;
    allow 91.108.4.0/22;
    deny all;

    # TLS — point at your Let's Encrypt / corporate cert chain.
    ssl_certificate     /etc/letsencrypt/live/bot.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.example.com/privkey.pem;

    # Telegram bots send single small JSON payloads; cap aggressively.
    client_max_body_size  16k;
    client_body_timeout   10s;
    keepalive_timeout     65s;

    location = /webhook {
        proxy_pass         http://phpbotgram_webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host                 $host;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto    $scheme;

        # Forward Telegram's secret-token header verbatim so the framework's
        # SimpleRequestHandler can validate it via hash_equals().
        proxy_set_header   X-Telegram-Bot-Api-Secret-Token  $http_x_telegram_bot_api_secret_token;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Health check endpoint that does NOT touch the bot. Useful for
    # load-balancer probes that should not count as bot traffic.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# Redirect HTTP -> HTTPS — Telegram requires HTTPS for webhooks.
server {
    listen 80;
    listen [::]:80;
    server_name bot.example.com;
    return 301 https://$host$request_uri;
}
