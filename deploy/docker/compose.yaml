# Docker compose for the phpbotgram test bot.
#
# Brings up:
#   - bot        long-polling echo bot built from deploy/docker/Dockerfile
#   - redis      optional FSM storage backend (set FSM_STORAGE=redis to use it)
#   - mongo      optional FSM storage backend (set FSM_STORAGE=mongo to use it)
#
# Quickstart:
#   BOT_TOKEN=123:abc docker compose -f deploy/docker/compose.yaml up --build
#
# The bot reads BOT_TOKEN from the environment. Optional FSM backends are
# off by default — the echo bot uses MemoryStorage which needs no external
# service.

services:
  bot:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: phpbotgram/echo:dev
    environment:
      BOT_TOKEN: "${BOT_TOKEN:?BOT_TOKEN must be set}"
      PHPBOTGRAM_REDIS_DSN: "${PHPBOTGRAM_REDIS_DSN:-}"
      PHPBOTGRAM_MONGO_DSN: "${PHPBOTGRAM_MONGO_DSN:-}"
    restart: unless-stopped
    # Long-polling needs outbound HTTPS to api.telegram.org; no inbound ports.
    depends_on:
      redis:
        condition: service_healthy
        required: false
      mongo:
        condition: service_healthy
        required: false

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:7
    profiles: ["mongo"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data:
