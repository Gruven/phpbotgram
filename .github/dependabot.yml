version: 2

updates:
  # Security updates are alert-driven; this schedule controls regular version updates.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "monthly"
      timezone: "Asia/Yekaterinburg"
    open-pull-requests-limit: 5
    groups:
      composer-security:
        applies-to: security-updates
        patterns:
          - "*"
      composer-runtime:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      composer-dev:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      timezone: "Asia/Yekaterinburg"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"
