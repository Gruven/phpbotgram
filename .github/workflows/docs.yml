name: API documentation

on:
  push:
    branches:
      - master
  workflow_dispatch:

# Required for the deploy-pages action to upload the artifact.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs when a new push arrives for the same ref. The docs
# site is single-source-of-truth; running two builds concurrently would race
# on the gh-pages artifact.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build phpDocumentor site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, sodium, json
          tools: composer:v2
          coverage: none

      # Cache vendor across runs so contributors don't wait on a full
      # composer install on every docs build. Key the cache on composer.lock
      # so any dep change invalidates it.
      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Install dependencies (no-dev would skip phpdoc shim, so keep dev)
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Generate API documentation
        run: composer docs-api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/api

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
