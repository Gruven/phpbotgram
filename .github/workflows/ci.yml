name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']
    services:
      redis:
        image: redis:8-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s
      mongo:
        image: mongo:8
        ports: ['27017:27017']
        options: --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\"" --health-interval 10s
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, mongodb, pcntl, sockets, openssl
          coverage: xdebug
      - uses: ramsey/composer-install@4.0.0
      - run: vendor/bin/php-cs-fixer fix --dry-run --diff
      - run: vendor/bin/phpstan analyze --no-progress --memory-limit=512M
      - run: vendor/bin/phpunit --coverage-text
        env:
          PHPBOTGRAM_TEST_REDIS_DSN: redis://127.0.0.1:6379
          PHPBOTGRAM_TEST_MONGO_DSN: mongodb://127.0.0.1:27017
